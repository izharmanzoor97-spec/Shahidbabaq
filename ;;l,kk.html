<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shahid Baba | Profile</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        <img src="https://instasize.com/..." alt="Profile Picture">

        /* Image Styling */
        <img {instasize.com/..." alt="Profile Picture">}
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #007bff;
            margin-bottom: 1rem;
        }

        h1 {
            margin-bottom: 0.5rem;
            color: #222;
        }

        p {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #666;
            margin-bottom: 1.5rem;
        }

        /* Form Styling */
        form {
            text-align: left;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.85rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
        }

        .radio-group {
            margin: 1rem 0;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://instasize.com/p/639ae28f351c58a3061eb07faf1fb31105b4e93dcd9d0bc320e5fadd4f03d344" alt="Profile Picture">
    
    <h1>BABA SHAHID</h1>
    <p>Hi, my name is <strong>Shahid Baba</strong>. My father is Shafe Baba and my brother is Shakir.</p>

    <form>
        <div class="form-group">
            <label for="fname">First Name</label>
            <input type="text" id="fname" placeholder="Enter first name" required>
        </div>

        <div class="form-group">
            <label for="lname">Last Name</label>
            <input type="text" id="lname" placeholder="Enter last name">
        </div>

        <div class="form-group">
            <label for="pass">Password</label>
            <input type="password" id="pass" placeholder="••••••••">
        </div>

        <div class="form-group">
            <label for="cell">Cell No</label>
            <input type="text" id="cell" placeholder="+00 000 000 000">
        </div>

        <div class="radio-group">
            <label><input type="radio" name="gender" value="male"> Male</label>
            <label><input type="radio" name="gender" value="female"> Female</label>
        </div>

        <button type="submit">Submit Details</button>
    </form>
</div>

</body>
</html>
